name: Build AWS EFS Utils for Debian 13

on:
  workflow_dispatch:      # Manual trigger from GitHub UI
  schedule:
    - cron: '0 3 1,15 * *'   # Runs automatically on the 1st and 15th of every month (~every 2 weeks)

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    permissions:
      contents: write   # Required for creating/updating GitHub Releases

    steps:
      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y \
            git binutils rustc cargo libssl-dev pkg-config gettext make cmake wget perl \
            gcc-13 g++-13 golang-go

      - name: Clone and Build EFS Utils
        id: extract-version
        run: |
          # Force consistent GCC 13 everywhere (fixes LTO version mismatch)
          export CC=gcc-13
          export CXX=g++-13
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=gcc-13

          git clone https://github.com/aws/efs-utils.git
          cd efs-utils

          # DYNAMIC VERSIONING (always uses exact upstream AWS version) ===
          UPSTREAM_VERSION=$(grep '^VERSION=' build-deb.sh | cut -d= -f2 | tr -d '"')
          echo "Upstream AWS version detected: $UPSTREAM_VERSION"
          echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT

          # Rename package from amazon-efs-utils → aws-efs-utils
          sed -i 's/^Package: amazon-efs-utils/Package: aws-efs-utils/' debian/control

          # Change release suffix so package becomes e.g. 2.4.2-1~debian13
          sed -i "s/^RELEASE=1$/RELEASE=1~debian13/" build-deb.sh

          ./build-deb.sh

          # Show final packages for logging
          ls -l build/aws-efs-utils*.deb

      - name: Verify the Debian Package
        run: |
          echo "🔍 Installing and testing the .deb on Debian 13..."
          DEBIAN_FRONTEND=noninteractive apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y ./efs-utils/build/aws-efs-utils*.deb

          echo "✅ Package installed successfully"
          dpkg -l | grep -i aws-efs-utils

          echo "✅ Checking binaries..."
          which mount.efs && echo "   mount.efs found at $(which mount.efs)"
          amazon-efs-utils --version && echo "   Version: $(amazon-efs-utils --version)"

          echo "🎉 Verification PASSED!"

      - name: Prepare Latest Asset
        run: |
          cd efs-utils
          cp build/aws-efs-utils-${{ steps.extract-version.outputs.version }}-1~debian13_amd64.deb \
             build/aws-efs-utils-latest~debian13_amd64.deb
          ls -l build/aws-efs-utils*.deb

      - name: Upload Artifact (temporary download)
        uses: actions/upload-artifact@v4
        with:
          name: aws-efs-utils-debian13
          path: efs-utils/build/aws-efs-utils*.deb
          retention-days: 14

      - name: Publish to aws-efs-utils/debian13 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aws-efs-utils/debian13
          name: AWS EFS Utils for Debian 13
          body: |
            **Debian 13 (trixie) build of aws-efs-utils**

            - Upstream version: ${{ steps.extract-version.outputs.version }}
            - Files in this release (folder `aws-efs-utils/debian13/`):
              - `aws-efs-utils-${{ steps.extract-version.outputs.version }}-1~debian13_amd64.deb` (specific version)
              - `aws-efs-utils-latest~debian13_amd64.deb` (always points to the latest build)
            - All previous versions are kept in this release.
            - Built on: ${{ github.event_name == 'schedule' && 'scheduled run' || 'manual trigger' }}
            - GitHub Actions run: ${{ github.run_id }}
            - Verification: ✅ Passed
          files: |
            efs-utils/build/aws-efs-utils-${{ steps.extract-version.outputs.version }}-1~debian13_amd64.deb
            efs-utils/build/aws-efs-utils-latest~debian13_amd64.deb
          draft: false
          prerelease: false
          make_latest: true   # Marks this as the "Latest" release in GitHub UI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
